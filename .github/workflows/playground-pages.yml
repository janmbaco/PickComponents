name: Playground Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build playground
        shell: bash
        run: |
          REPOSITORY_NAME="${GITHUB_REPOSITORY#*/}"
          BASE_PATH="/${REPOSITORY_NAME}"

          if [[ "${REPOSITORY_NAME}" == "${GITHUB_REPOSITORY_OWNER}.github.io" ]]; then
            BASE_PATH=""
          fi

          PLAYGROUND_BASE_PATH="${BASE_PATH}" \
          PLAYGROUND_SITE_ORIGIN="https://${GITHUB_REPOSITORY_OWNER}.github.io" \
          npm run build:examples

          touch examples/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: examples

  deploy:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

