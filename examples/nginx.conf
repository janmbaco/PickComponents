server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # File-first public routes, then SPA fallback for app-only paths.
    # Extensionless public routes still serve HTML, so apply HTML cache policy here.
    location / {
        try_files $uri $uri/index.html $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Cache static assets (CSS, images, fonts — not JS bundles)
    location ~* \.(css|png|jpg|jpeg|svg|gif|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # JS bundles: validate freshness on every request
    location ~* \.js$ {
        add_header Cache-Control "no-cache" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Disable caching for HTML (so prerendered routes always get latest)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Access-Control-Allow-Origin "*" always;
    }
}
